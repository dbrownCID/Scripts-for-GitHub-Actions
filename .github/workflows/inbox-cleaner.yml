name: Inbox Cleaner

on:
  schedule:
    # Every hour from 8am to 8pm Eastern (12:00–00:00 UTC)
    - cron: "0 12 * * *"   # 8am ET
    - cron: "0 13 * * *"   # 9am ET
    - cron: "0 14 * * *"   # 10am ET
    - cron: "0 15 * * *"   # 11am ET
    - cron: "0 16 * * *"   # 12pm ET
    - cron: "0 17 * * *"   # 1pm ET
    - cron: "0 18 * * *"   # 2pm ET
    - cron: "0 19 * * *"   # 3pm ET
    - cron: "0 20 * * *"   # 4pm ET
    - cron: "0 21 * * *"   # 5pm ET
    - cron: "0 22 * * *"   # 6pm ET
    - cron: "0 23 * * *"   # 7pm ET
    - cron: "0 0  * * *"   # 8pm ET
  workflow_dispatch:        # also run manually from GitHub UI

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r briefing/requirements.txt

      - name: Run inbox cleaner
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_TOKEN:           ${{ secrets.GOOGLE_TOKEN }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python briefing/clean_inbox.py

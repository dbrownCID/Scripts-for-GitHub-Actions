name: Evening Briefing

on:
  schedule:
    # 7:00 PM Eastern = 23:00 UTC (accounts for EDT; adjust to 00:00 UTC in winter for EST)
    - cron: "0 23 * * *"
  workflow_dispatch:   # also lets you trigger manually from GitHub UI

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r briefing/requirements.txt

      - name: Debug line 134
        run: sed -n '132,136p' briefing/run.py | cat -A

      - name: Run evening briefing
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_TOKEN:           ${{ secrets.GOOGLE_TOKEN }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python briefing/run.py
